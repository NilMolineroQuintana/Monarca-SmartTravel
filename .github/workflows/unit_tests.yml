name: Unit Tests CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configure JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Give permissions to Gradlew
        run: chmod +x app/gradlew

      - name: Execute Unit Tests
        run: |
          cd app
          ./gradlew testDebugUnitTest